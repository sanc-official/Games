function makeAtkTable(nrm){
  const T={};
  for(const pose of ['s','c']){
    for(const [btnStr,arr] of Object.entries(nrm[pose])){
      const [su,ac,rec,dmg,flag]=arr;
      const btn=btnStr[0]==='l'&&btnStr[1]==='p'?'p':(btnStr[1]==='p'?'p':'k');
      const str=btnStr[0];   // l/m/h
      const low=flag==='low'||flag==='lowkd';
      const kd=flag==='lowkd'||flag==='kd';
      const aa=flag==='aa';
      const reach=(btn==='k'?54:42)+(str==='m'?10:str==='h'?22:0);
      let box;
      if(pose==='c'){
        box= aa ? {x:4,y:-120,w:40,h:48}
            : low ? {x:14,y:-20,w:reach+8,h:16}
            : {x:18,y:-54,w:reach,h:16};
      }else{
        box={x:18,y:btn==='k'?-72:-86,w:reach,h:18};
      }
      T[pose+'_'+btnStr]={startup:su,active:ac,rec:rec,dmg:dmg,
        push:4+(dmg/3|0),kd:kd,crouch:pose==='c',heavy:str==='h',
        box:box,btn:btn,str:str};
    }
  }
  return T;
}

function getFrameIdx(f){
  const R=f.chr.roles, t=f.t, fr=f.frame;
  switch(f.state){
    case 'idle': return R.idle[Math.floor(fr/24)%R.idle.length];
    case 'walk': return R.walk[Math.floor(fr/6)%R.walk.length];
    case 'crouch': case 'dpland': return R.crouch;
    case 'block': return f.crouchHeld?R.gCrouch:R.gStand;
    case 'atk':{
      const a=f.atk;
      if(!a) return R.idle[0];
      if(a.mash) return (t>>2)%2 ? R.lp[1] : R.lp[0];   // 百裂掌
      if(a.crouch) return a.btn==='k' ? R.sweep : R.clp;
      const pair = a.btn==='k' ? R.hk : R.lp;
      return t<a.startup ? pair[0] : pair[1];
    }
    case 'fb':    return t<8?R.fb[0]:R.fb[1];
    case 'beam':{ const b=R.beam||[R.fb[0],R.hk[1]]; return t<f.beamWind ? b[0] : b[1]; }
    case 'dp':    return R.dp;
    case 'rush':  return R.rush;
    case 'jump':  return f.airAtk?(f.airAtk.t<5?R.jkick[0]:R.jkick[1]):R.jump;
    case 'fall':  return t<6?R.fall[0]:R.fall[1];
    case 'down':  return R.down;
    case 'getup': return t<9?R.getup[0]:R.getup[1];
    case 'hit':   return t<4?R.hit[0]:R.hit[1];
    case 'win':   return R.win;
    case 'ko_wait': return R.down;
    default: return R.idle[0];
  }
}

// プリズムガード: 追加モーションシートを使う状態なら extraFrames のインデックスを返す（それ以外は null）。
// story-draft.js PRISM_GUARD_EXTRA_FRAMES の定義（EXTRA_PRISM）をそのまま参照する。
function prismExtra(f){
  const c=f.chr, E=c.extra;
  if(!E || !c.extraFrames) return null;
  // beam状態は基本シート（ROLES_PRISM.beam）を使用。追加シートの30/31はビーム爆発主体でキャラ不可視のため不使用
  if(f.state==='dp'){ const a=E.risingBoot; return a[Math.min(a.length-1,(f.t/6)|0)]; } // 13-15: ライジングプリズム
  if(f.state==='block') return E.guardRecoil[f.crouchHeld?1:0];                          // 16/17: ガード硬直
  if(f.state==='jump'){
    if(f.airAtk && f.airAtk.drop){ const a=E.upsideDownFlipFall; return a[(f.airAtk.t>>2)%a.length]; } // 21-23: フォトンドロップ
    if(f.airAtk){ const a=E.longSideKick; return a[Math.min(a.length-1,(f.airAtk.t/5)|0)]; }           // 10-12: 空中キック
    const a=E.risingBoot; return f.vy<0 ? a[1] : a[2];                                                  // 上昇/下降
  }
  return null;
}

// スプライトシートを cols×rows のセルに分割し、各セルから [sx,sy,sw,sh,cx,footY] を生成する。
// 生成シートはポーズがセル境界を縦にはみ出す（頭が上の行へ食い込む）ため、単純なセル内bboxだと
// 頭が切れる＋隣ポーズの断片を拾ってアンカーがズレる。対策として連結成分ベースで切り出す:
//  - 探索領域は横=セル厳守（隣接ポーズ混入防止）、縦=上32%/下10%まで拡張（頭・足のはみ出し回収）
//  - セル内に種を持つ連結成分のうち主要なもの（最大成分の22%以上）だけを採用 → 隣の頭の断片を除外
//  - cx は bbox中央ではなく「足元（bbox下端15%）の不透明ピクセル重心X」→ 横長エフェクト入りでもズレない
function sliceSheetByGrid(img, cols, rows, groundIdx, hxSet){
  const cw=img.width/cols, ch=img.height/rows;
  const oc=document.createElement('canvas'); oc.width=img.width; oc.height=img.height;
  const octx=oc.getContext('2d'); octx.drawImage(img,0,0);
  let data=null;
  try{ data=octx.getImageData(0,0,img.width,img.height).data; }catch(e){ data=null; }
  const W2=img.width, H2=img.height, frames=[];
  const opaque=(x,y)=> data[(y*W2+x)*4+3]>24;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const x0=Math.round(c*cw), y0=Math.round(r*ch);
      const x1=Math.min(W2-1, Math.round((c+1)*cw)-1);
      const y1=Math.min(H2-1, Math.round((r+1)*ch)-1);
      const fallback=[x0,y0,x1-x0+1,y1-y0+1,(x1-x0+1)/2,(y1-y0+1)*0.94];
      if(!data){ frames.push(fallback); continue; }
      const yT=Math.max(0, y0-Math.round(ch*0.32));
      const yB=Math.min(H2-1, y1+Math.round(ch*0.10));
      // 横方向の探索拡張は hxSet に含まれるフレームのみ（手足がセル境界を越えて伸びるフレーム対策）。
      // 全フレーム拡張すると隣接ポーズが近いキック等で隣を巻き込むため、対象を限定する。
      // 種はセル内限定なので、透明ギャップで分かれた隣ポーズは別成分として拾わない。
      const hExp=(hxSet && hxSet.has(r*cols+c)) ? 0.45 : 0;
      const xL=Math.max(0, x0-Math.round(cw*hExp));
      const xR=Math.min(W2-1, x1+Math.round(cw*hExp));
      const rw=xR-xL+1, rh=yB-yT+1;
      const lab=new Int32Array(rw*rh).fill(-1);
      const li=(x,y)=>(y-yT)*rw+(x-xL);
      // セル内を種に8近傍BFSで連結成分を列挙（縦の拡張域へは伸びてよい）
      const comps=[]; const stack=[];
      for(let sy=y0;sy<=y1;sy++)for(let sx=x0;sx<=x1;sx++){
        if(!opaque(sx,sy) || lab[li(sx,sy)]>=0) continue;
        const id=comps.length;
        let n=0, nIn=0, minX=sx,maxX=sx,minY=sy,maxY=sy;
        lab[li(sx,sy)]=id; stack.length=0; stack.push(sx,sy);
        while(stack.length){
          const py=stack.pop(), px=stack.pop();
          n++;
          if(py>=y0&&py<=y1) nIn++;   // 元セル内のピクセル数（拡張域の断片を区別する）
          if(px<minX)minX=px; if(px>maxX)maxX=px;
          if(py<minY)minY=py; if(py>maxY)maxY=py;
          for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
            if(!dx&&!dy) continue;
            const nx=px+dx, ny=py+dy;
            if(nx<xL||nx>xR||ny<yT||ny>yB) continue;
            if(!opaque(nx,ny) || lab[li(nx,ny)]>=0) continue;
            lab[li(nx,ny)]=id; stack.push(nx,ny);
          }
        }
        comps.push({id,n,nIn,minX,maxX,minY,maxY});
      }
      if(!comps.length){ frames.push(fallback); continue; }
      // 採用条件:
      //  - セル内ピクセルが一定以上（小さな飛沫を除外）
      //  - 縦の拡張限界に接触していない（接触＝隣の行のスプライトが食い込んだもの。
      //    自キャラの頭/足は拡張域の途中で終わるので接触しない）
      const bestN=Math.max(...comps.map(o=>o.nIn));
      let keep=comps.filter(o=>
        o.nIn>=Math.max(bestN*0.15,120) && o.maxY<yB-1 && o.minY>yT+1);
      // 全滅したら（自キャラ自体が限界まで届く特殊ケース）セル内最大成分だけ採用
      if(!keep.length) keep=[comps.reduce((a,b)=>a.nIn>=b.nIn?a:b)];
      // 横方向: 最大成分とX範囲が重なる成分だけ残す
      // （セル幅が非整数のシートで隣の列のポーズが同セルに入り込む対策）
      const main=keep.reduce((a,b)=>a.nIn>=b.nIn?a:b);
      keep=keep.filter(o=> o===main || (o.minX<=main.maxX+8 && o.maxX>=main.minX-8));
      // 接地フレーム（ダウン等）対策: 生成シートは1セルに上下2ポーズ（のけぞり＋仰向け）を
      // 描くことがあり、X範囲が重なると両方残って1枠に2体描かれ「分裂」して見える。
      // この種のフレームでは最も低い（接地した）成分のクラスタだけ残し、上の別ポーズを捨てる。
      if(groundIdx && groundIdx.has(r*cols+c) && keep.length>1){
        const lowest=keep.reduce((a,b)=> a.maxY>=b.maxY?a:b);
        keep=keep.filter(o=> o.maxY>=lowest.minY && o.minY<=lowest.maxY); // lowest とY重なりのある成分のみ
      }
      const keepIds=new Set(keep.map(o=>o.id));
      let minX=W2,maxX=0,minY=H2,maxY=0;
      for(const o of keep){
        if(o.minX<minX)minX=o.minX; if(o.maxX>maxX)maxX=o.maxX;
        if(o.minY<minY)minY=o.minY; if(o.maxY>maxY)maxY=o.maxY;
      }
      // bboxが下方拡張の限界まで届いている場合、下の行のスプライト（頭がセルへ食い込み
      // 本体と連結してしまったもの）を拾っている。セル下端で切り詰めて除外する。
      if(maxY>=yB-1) maxY=y1;
      const sw=maxX-minX+1, sh=maxY-minY+1;
      // 足元重心X
      const fy0=Math.max(minY, maxY-Math.max(2,Math.round(sh*0.15)));
      let sum=0,cnt=0;
      for(let y=fy0;y<=maxY;y++)for(let x=minX;x<=maxX;x++){
        if(x<xL||x>xR||y<yT||y>yB) continue;
        const v=lab[li(x,y)];
        if(v>=0 && keepIds.has(v)){ sum+=x; cnt++; }
      }
      const cx=cnt ? (sum/cnt - minX) : sw/2;
      frames.push([minX, minY, sw, sh, cx, sh]);
    }
  }
  return frames;
}

let AC=null;
function audio(){
  if(!AC){
    try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}
    if(AC) decodeAllSnd();
  }
  if(AC && AC.state==='suspended') AC.resume();
  return AC;
}
function beep(f0,f1,dur,type,vol){
  const ac=audio(); if(!ac) return;
  const o=ac.createOscillator(), g=ac.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(f0,ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),ac.currentTime+dur);
  g.gain.setValueAtTime(vol||0.12,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(); o.stop(ac.currentTime+dur);
}

    }).catch(()=>{});

function decodeSnd(k){
  AC.decodeAudioData(SND.raw[k].slice(0)).then(b=>{SND.buf[k]=b;}).catch(()=>{});
}
function decodeAllSnd(){
  for(const k in SND.raw) if(!SND.buf[k]) decodeSnd(k);
}
function playSnd(k,vol){
  if(!AC||!SND.buf[k]) return false;
  const s=AC.createBufferSource(); s.buffer=SND.buf[k];
  const g=AC.createGain(); g.gain.value=vol==null?0.8:vol;
  s.connect(g); g.connect(AC.destination);
  s.start();
  return true;
}
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function voice(f,kind,vol,opts){
  const vc=f.chr.voice; if(!vc) return;
  opts=opts||{};
  // クールダウン: 短時間にボイスが重なりすぎないよう抑制（KO/勝利/開始/必殺は force で無視）
  if(!opts.force && f._vcd!=null && game.frame < f._vcd) return;
  f._vcd = game.frame + (opts.cd!=null ? opts.cd : 16);
  let key='v_'+vc+'_'+kind;
  if(vc==='prism' && kind==='win1') key='v_prism_'+pick(['win1','win2','win3','win4']);
  playSnd(key, vol==null?0.8:vol);
}

// 通常攻撃でボイスを鳴らす確率（キャラの性格で喋りすぎを調整）
const VOICE_ATK_FREQ={ ryuji:0.40, aoi:0.45, bront:0.40, sayo:0.30, gouma:0.20, kensei:0.40, prism:0.25 };
// 行動情報から voice kind を決定（完全ランダムを廃止し、攻撃の強さ・種別で固定/重み付け）
function attackVoiceKind(info){
  if(info.special) return 'special1';                                  // 必殺/超必/特殊行動
  if(info.throw)   return Math.random()<0.5 ? 'attack3' : 'special1';  // 投げ
  if(info.mash)    return (game.frame>>3)&1 ? 'attack2' : 'attack1';   // 連打技は1/2交互
  if(info.air)     return Math.random()<0.5 ? 'attack2' : 'attack3';   // 空中攻撃
  return info.str==='h' ? 'attack3' : info.str==='m' ? 'attack2' : 'attack1';  // 弱→1 中→2 強→3
}
// 攻撃ボイス発火: 必殺技は確実、通常攻撃はキャラ別確率＋クールダウンで控えめに
function attackVoice(f,info){
  info=info||{};
  const kind=attackVoiceKind(info);
  // プリズムガード専用: ビーム系の通常必殺（special:true）は special1 ではなく attack2/3 を使い、
  // special1 は超必ビーム（voice('special1') 直接呼び）に温存する。投げ等の throw 経路は従来通り。
  if(kind==='special1' && info.special && f.chr.voice==='prism'){
    voice(f, Math.random()<0.5?'attack2':'attack3', 0.82, {cd:22}); return;
  }
  if(kind==='special1'){ voice(f,'special1', 0.9, {force:true, cd:22}); return; }
  const freq=VOICE_ATK_FREQ[f.chr.voice] ?? 0.35;
  if(Math.random()<freq) voice(f, kind, info.str==='h' ? 0.82 : 0.68);
}

// 仮想スティック: 中心からのオフセットでWASDを設定。斜めも入るので236/623/214コマンド入力可。
(function(){
  const base=document.getElementById('stick'), nub=document.getElementById('nub');
  let pid=null;
  function apply(dx,dy){
    const t=Math.max(12,base.clientWidth*0.14);   // 遊び（デッドゾーン）
    touchKey('a',dx<-t); touchKey('d',dx>t);
    touchKey('w',dy<-t); touchKey('s',dy>t);
  }
  function move(e){
    const r=base.getBoundingClientRect();
    const dx=e.clientX-(r.left+r.width/2), dy=e.clientY-(r.top+r.height/2);
    const m=r.width*0.30, len=Math.hypot(dx,dy)||1, c=Math.min(1,m/len);
    nub.style.transform='translate(calc(-50% + '+(dx*c)+'px), calc(-50% + '+(dy*c)+'px))';
    apply(dx,dy);
  }
  base.addEventListener('pointerdown',e=>{
    e.preventDefault(); audio();
    pid=e.pointerId;
    try{ base.setPointerCapture(pid); }catch(err){}
    move(e);
  });
  base.addEventListener('pointermove',e=>{ if(e.pointerId===pid) move(e); });
  function end(e){
    if(e.pointerId!==pid) return;
    pid=null;
    keys['a']=keys['d']=keys['w']=keys['s']=false;
    nub.style.transform='translate(-50%,-50%)';
  }
  base.addEventListener('pointerup',end);
  base.addEventListener('pointercancel',end);
  base.addEventListener('contextmenu',e=>e.preventDefault());
})();

// ================= ファイター =================
class Fighter{
  constructor(idx,chr,opts){
    this.idx=idx; this.chr=chr; this.name=chr.name;
    // 当たり判定スケール: 見た目scaleに連動（基準0.66）。判定boxとビーム位置の倍率に使う。
    this.hitScale = chr.scale / 0.66;
    this.tint=null;
    if(opts&&opts.shadow){ this.tint='brightness(0.4) saturate(50%)'; this.name='影・'+chr.name; }
    this.reset(0,1);
  }
  reset(x,facing){
    this.x=x; this.y=GROUND; this.vx=0; this.vy=0; this.facing=facing;
    this.hp=100; this.meter=0;
    this.state='idle'; this.t=0; this.stun=0; this.frame=0;
    this.atkName=null; this.atk=null; this.hitConsumed=true;
    this.airAtk=null; this.fbSpawned=false; this.fbSuper=false; this.rushCfg=null;
    this.flashT=0; this.lastDir=5; this.hist=[];
    this.inpBack=false; this.crouchHeld=false;
    this.aiT=0; this.aiPlan='idle'; this.aiNew=false;
    this.bufP=0; this.bufK=0;
    this.pTimes=[]; this.airFb=false; this.tpCd=0; this.tpT=0;
    // プリズムガード用: 巨大ビーム超必 / 足元ビーム
    this.beamCfg=null; this.beamWind=0; this.beamActive=0; this.beamRec=0; this.fbOptic=false;
  }
  grounded(){ return this.y>=GROUND-0.5 && this.state!=='jump' && this.state!=='fall'; }
  canAct(){ return ['idle','walk','crouch'].includes(this.state); }
  invul(){
    if(this.state==='getup') return true;
    if(this.state==='down') return true;
    if(this.state==='dp' && this.t<8) return true;
    return false;
  }
  hurtbox(){
    const s=this.hitScale;
    if(this.state==='down'||this.state==='getup') return {x:this.x-30*s,y:this.y-22*s,w:60*s,h:22*s};
    if(this.state==='rush'&&this.rushCfg&&this.rushCfg.low) return {x:this.x-26*s,y:this.y-46*s,w:52*s,h:46*s};
    if(this.state==='jump'||this.state==='fall'||this.state==='dp') return {x:this.x-20*s,y:this.y-96*s,w:40*s,h:74*s};
    let h=100;
    if(this.state==='crouch'||this.state==='dpland') h=66;
    if(this.state==='atk'&&this.atk&&this.atk.crouch) h=66;
    if(this.state==='block'&&this.crouchHeld) h=66;
    return {x:this.x-22*s,y:this.y-h*s,w:44*s,h:h*s};
  }
  worldBox(b){
    const s=this.hitScale;
    const bx=b.x*s, by=b.y*s, bw=b.w*s, bh=b.h*s;
    return { x: this.facing===1 ? this.x+bx : this.x-bx-bw, y:this.y+by, w:bw, h:bh };
  }
  activeHitbox(){
    if(this.hitConsumed) return null;
    if(this.state==='atk'&&this.atk){
      const a=this.atk;
      if(this.t>=a.startup && this.t<a.startup+a.active) return this.worldBox(a.box);
    }
    if(this.state==='dp' && this.t>=3 && this.t<=16) return this.worldBox({x:-4,y:-134,w:44,h:84});
    if(this.state==='rush' && this.rushCfg && this.t>=3 && this.t<=18){
      const low=this.rushCfg.low;
      return this.worldBox({x:4,y:low?-40:-86,w:54,h:low?36:56});
    }
    if(this.state==='jump' && this.airAtk){
      const at=this.airAtk.t;
      if(this.airAtk.drop){ if(at>=2 && at<=26) return this.worldBox({x:-10,y:-54,w:62,h:72}); }   // フォトンドロップ
      else if(at>=4 && at<=20) return this.worldBox({x:8,y:-62,w:46,h:28});
    }
    // 巨大ビーム超必: 発射中は画面前方を横断する太い帯（多段）
    if(this.state==='beam' && this.beamCfg){
      const w=this.beamWind, a=this.beamActive;
      if(this.t>w && this.t<=w+a) return this.worldBox({x:10,y:-104,w:W,h:64});
    }
    return null;
  }
  curAtkInfo(){
    if(this.state==='atk'&&this.atk) return {dmg:this.atk.dmg, kd:this.atk.kd, heavy:this.atk.heavy, special:false, push:this.atk.push, btn:this.atk.btn, str:this.atk.str};
    if(this.state==='dp') return {dmg:this.chr.sp.dp.dmg, kd:true, heavy:true, special:true, push:8};
    if(this.state==='rush'&&this.rushCfg) return {dmg:this.rushCfg.dmg, kd:true, heavy:true, special:true, push:9};
    if(this.state==='beam'&&this.beamCfg){
      const hits=Math.max(3,(this.beamActive/4)|0);
      return {dmg:Math.max(3,Math.round(this.beamCfg.dmg/hits)), kd:false, heavy:true, special:true, push:2};
    }
    if(this.state==='jump'&&this.airAtk&&this.airAtk.drop) return {dmg:this.chr.sp.airDrop.dmg, kd:true, heavy:true, special:true, push:7};
    if(this.state==='jump'&&this.airAtk) return {dmg:11, kd:false, heavy:true, special:false, push:7};
    return {dmg:5,kd:false,heavy:false,special:false,push:4};
  }
  pushDir(inp){
    let col=(inp.right?1:0)-(inp.left?1:0);
    if(this.facing<0) col=-col;
    const row= inp.down?-1:(inp.up?1:0);
    const d=5+col+row*3;
    if(d!==this.lastDir){
      this.hist.push({d,t:performance.now()});
      this.lastDir=d;
      if(this.hist.length>24) this.hist.shift();
    }
  }
  checkSeq(seq){
    const now=performance.now(); let i=0;
    for(const h of this.hist){
      if(now-h.t>450) continue;
      if(h.d===seq[i]) i++;
      if(i>=seq.length) return true;
    }
    return false;
  }
  startAttack(name){
    this.atkName=name;
    this.atk = name==='mash' ? MASH_ATK : this.chr.atk[name];
    if(!this.atk){ this.atk=this.chr.atk.s_lp; this.atkName='s_lp'; }
    this.state='atk'; this.t=0; this.hitConsumed=false;
    SFX.swing();
    attackVoice(this,{str:this.atk.str, mash:this.atk.mash});
  }
  // ---- 投げ ----
  throwable(opp){
    return opp.grounded() && ['idle','walk','crouch','block','atk'].includes(opp.state);
  }
  doThrow(opp,dmg,vName,sup){
    const dir=(opp.x>=this.x)?1:-1;
    game.lastHitSuper=!!sup;
    game.hitstop=9; game.shake=8;
    SFX.heavy();
    if(vName==='special1') voice(this,'special1',0.9,{force:true,cd:22}); else attackVoice(this,{throw:true});
    spark(opp.x,opp.y-60,'#ffd24a',12);
    opp.hp=Math.max(0,opp.hp-dmg);
    opp.flashT=4; opp.airAtk=null;
    if(opp.hp<=0) voice(opp,'death1',0.95,{force:true}); else voice(opp,'damage2',0.78);
    opp.state='fall'; opp.t=0; opp.vy=-8.5; opp.vx=dir*4.4;
    this.meter=Math.min(100,this.meter+10);
    game.score[this.idx]+=dmg*105;
    this.state='atk'; this.startAttack('s_hp'); this.t=this.atk.startup; this.hitConsumed=true;
    checkKO();
  }
  // ブロント: コマ投げ / 超必投げ（63214P）
  cmdGrab(opp){
    const cfg=(this.meter>=100 && this.chr.sp.supGrab)?this.chr.sp.supGrab:this.chr.sp.cmdGrab;
    if(!cfg) return false;
    const sup=(cfg===this.chr.sp.supGrab);
    if(Math.abs(opp.x-this.x)<=cfg.range && this.throwable(opp)){
      if(sup){ this.meter=0; game.flash=14; SFX.super(); }
      this.doThrow(opp,cfg.dmg,'special1',sup);
    }else{
      this.startAttack('s_hp'); // 空振り
    }
    return true;
  }
  // 214K系（旋風脚/螺旋穿ち/扇歩/鬼旋脚）
  specialTatsu(){
    const cfg=this.chr.sp.tatsu;
    if(!cfg) return false;
    if(cfg.type==='move'){
      // 扇歩: 高速前ステップ（攻撃判定なし）
      this.state='rush'; this.t=0; this.hitConsumed=true;
      this.rushCfg={spd:cfg.spd,dur:cfg.dur,dmg:0,move:true};
      this.vx=this.facing*cfg.spd;
      SFX.jump();
    }else{
      this.state='rush'; this.t=0; this.hitConsumed=false;
      this.rushCfg=cfg; this.vx=this.facing*cfg.spd;
      SFX.dp(); attackVoice(this,{special:true});
    }
    return true;
  }
  // 巨大ビーム超必（プリズムガード: 236236P=メガ / 214214P=スーパー）
  specialBeam(alt){
    const cfg= alt ? this.chr.sp.supAlt : this.chr.sp.sup;
    if(!cfg || this.meter<100) return false;
    this.meter=0; game.flash=14; SFX.super(); voice(this,'special1',0.95,{force:true,cd:26});
    this.state='beam'; this.t=0; this.hitConsumed=true;
    this.beamCfg={dmg:cfg.dmg, name:cfg.name, fast:!!cfg.fast};
    this.beamWind = cfg.fast?6:14; this.beamActive=18; this.beamRec=16;
    return true;
  }
  // 足元ビーム（プリズムガード: 236K / 低い水平弾を地面付近に発射）
  specialOptic(){
    const c=this.chr.sp.opticSweep; if(!c) return false;
    if(projectiles.some(pr=>pr.owner===this&&!pr.dead&&pr.low)) return true;
    this.state='fb'; this.t=0; this.fbSpawned=false; this.fbSuper=false; this.fbOptic=true;
    SFX.fb(); attackVoice(this,{special:true});
    return true;
  }
  specialFB(sup){
    const cfg=sup?this.chr.sp.sup:this.chr.sp.fb;
    if(sup && this.meter<100) return;
    if(sup && cfg.type==='beam'){ this.specialBeam(false); return; }  // ビーム超必へ委譲
    if(cfg.type==='proj' && projectiles.some(pr=>pr.owner===this&&!pr.dead)) return;
    if(sup){ this.meter=0; game.flash=14; SFX.super(); voice(this,'special1',0.95,{force:true,cd:26}); }
    else if(cfg.type==='proj'){ SFX.fb(); attackVoice(this,{special:true}); }
    else { SFX.dp(); attackVoice(this,{special:true}); }
    if(cfg.type==='proj'){
      this.state='fb'; this.t=0; this.fbSpawned=false; this.fbSuper=!!sup;
    }else{
      this.state='rush'; this.t=0; this.hitConsumed=false;
      this.rushCfg=cfg; this.vx=this.facing*cfg.spd;
    }
  }
  specialDP(){
    const d=this.chr.sp.dp;
    if(d.airGrab){
      // ブロント: クレーンキャッチ（対空投げ）
      const opp=(this===p1)?p2:p1;
      if((opp.state==='jump'||opp.state==='fall'||opp.y<GROUND-10) && Math.abs(opp.x-this.x)<84){
        voice(this,'special1',0.9,{force:true,cd:22});
        this.doThrow(opp,d.dmg,'special1');
        return;
      }
    }
    this.state='dp'; this.t=0; this.vy=d.vy; this.hitConsumed=false; SFX.dp();
    voice(this,'special1',0.9,{force:true,cd:22});
  }
  takeHit(dmg,dir,kd){
    this.hp=Math.max(0,this.hp-dmg);
    this.flashT=5;
    this.meter=Math.min(100,this.meter+8);
    if(this.hp<=0){ kd=true; voice(this,'death1',0.95,{force:true}); }
    else { const heavyHit = dmg>=11 || kd; voice(this, heavyHit?'damage2':'damage1', 0.72); }
    this.airAtk=null;
    if(kd || this.state==='jump' || this.y<GROUND-1){
      this.state='fall'; this.t=0; this.vy=-9; this.vx=dir*3.4;
    }else{
      this.state='hit'; this.stun=(dmg>=12?24:16); this.vx=dir*4.5;
    }
  }
  enterBlock(stun,chip,dir,crouching){
    this.state='block'; this.stun=stun; this.vx=dir*3; this.crouchHeld=crouching;
    this.meter=Math.min(100,this.meter+4);
    if(chip>0){ this.hp=Math.max(0,this.hp-chip); this.flashT=3; }
    // プリズムガード専用: ガード成功ボイス（guard1/guard2をランダム）。控えめ確率＋長めクールダウンで連続防御中の重なりを抑制。
    if(this.chr.voice==='prism' && Math.random()<0.5)
      voice(this, Math.random()<0.5?'guard1':'guard2', 0.7, {cd:30});
  }
  update(inp,opp){
    this.frame++;
    if(this.flashT>0) this.flashT--;
    // 先行入力バッファ（硬直明けに技が出る）
    if(inp.punch) this.bufP=8; else if(this.bufP>0) this.bufP--;
    if(inp.kick)  this.bufK=8; else if(this.bufK>0) this.bufK--;
    // 向き（行動可能時のみ）
    if(this.canAct()){
      const nf=(opp.x>=this.x)?1:-1;
      this.facing=nf;
    }
    this.inpBack = (opp.x>this.x ? inp.left : inp.right);
    if(this.grounded()) this.pushDir(inp);

    switch(this.state){
      case 'hit':
        this.x+=this.vx; this.vx*=0.82;
        if(--this.stun<=0) this.state='idle';
        break;
      case 'block':
        this.x+=this.vx; this.vx*=0.8;
        if(--this.stun<=0) this.state='idle';
        break;
      case 'fall':
        this.x+=this.vx; this.y+=this.vy; this.vy+=0.7;
        if(this.y>=GROUND){ this.y=GROUND; this.vy=0; this.vx=0; this.state='down'; this.t=50; SFX.thud(); spark(this.x,this.y-6,'#caa',6); }
        break;
      case 'down':
        this.t--;
        if(this.t<=0 && this.hp>0 && game.state==='fight'){ this.state='getup'; this.t=18; }
        break;
      case 'getup':
        if(--this.t<=0) this.state='idle';
        break;
      case 'dpland':
        if(--this.t<=0) this.state='idle';
        break;
      case 'dp':
        this.t++;
        this.y+=this.vy; this.vy+=0.78;
        this.x+=this.facing*2.2;
        if(this.y>=GROUND && this.t>6){ this.y=GROUND; this.vy=0; this.state='dpland'; this.t=22; }
        break;
      case 'fb':
        this.t++;
        if(this.t===8 && !this.fbSpawned){
          this.fbSpawned=true;
          if(this.fbOptic){
            // 足元ビーム: 地面付近を走る低い水平弾
            const c=this.chr.sp.opticSweep;
            projectiles.push({x:this.x+this.facing*40, y:GROUND-14, vx:this.facing*c.spd,
              owner:this, sup:false, dead:false, t:0, dmg:c.dmg, r:c.r||10, warm:false,
              low:true, beamThin:true, life:c.life||80});
            this.fbOptic=false;
          }else{
            spawnProj(this,this.fbSuper); this.meter=Math.min(100,this.meter+(this.fbSuper?0:4));
          }
        }
        if(this.t>=24) this.state='idle';
        break;
      case 'beam':{
        this.t++;
        const w=this.beamWind, a=this.beamActive;
        if(this.t>w && this.t<=w+a){
          // 発射中は数フレームごとにヒット判定を再有効化（多段）＋画面揺れ
          if((this.t-w)%4===1) this.hitConsumed=false;
          if(this.t===w+1){ game.flash=Math.max(game.flash,16); game.shake=Math.max(game.shake,16); SFX.super(); }
          game.shake=Math.max(game.shake,6);
        }
        if(this.t>=w+a+this.beamRec){ this.state='idle'; this.beamCfg=null; }
        break;
      }
      case 'rush':{
        this.t++;
        this.x+=this.vx;
        const dur=(this.rushCfg&&this.rushCfg.dur)||20;
        if(this.t>=dur){ this.state='idle'; this.vx=0; this.rushCfg=null; }
        break;
      }
      case 'atk':{
        this.t++;
        const a=this.atk;
        // 百裂掌: 一定間隔でヒット判定を再有効化
        if(a.mash && this.t>a.startup && this.t%7===0) this.hitConsumed=false;
        if(this.t>=a.startup+a.active+a.rec){
          this.state=(a.crouch&&inp.down)?'crouch':'idle';
        }
        break;
      }
      case 'jump':
        this.x+=this.vx; this.y+=this.vy; this.vy+=0.8;
        if(this.airAtk) this.airAtk.t++;
        else if(this.bufP>0 && this.chr.sp.airFb && !this.airFb && this.checkSeq([2,3,6])){
          // ゴウマ: 空虚弾（空中236P / 斜め下弾）
          this.bufP=0; this.airFb=true;
          const c=this.chr.sp.airFb;
          projectiles.push({x:this.x+this.facing*30, y:this.y-70, vx:this.facing*c.spd, vy:c.vy,
            owner:this, sup:false, dead:false, t:0, dmg:c.dmg, r:c.r, warm:!!c.warm, life:9999});
          SFX.fb(); attackVoice(this,{special:true});
        }
        else if(this.bufP>0 && this.chr.sp.airDrop && !this.airAtk && this.checkSeq([2,1,4])){
          // プリズムガード: フォトンドロップ（空中214P / 落下打撃投げ風）
          this.bufP=0; this.airAtk={t:0,drop:true}; this.hitConsumed=false;
          this.vy=Math.max(this.vy,1.5); this.vx=this.facing*2.5;
          SFX.dp(); voice(this,'special1',0.85,{force:true,cd:22});
        }
        else if(this.bufP>0||this.bufK>0){ this.bufP=0; this.bufK=0; this.airAtk={t:0}; this.hitConsumed=false; }
        if(this.y>=GROUND){ this.y=GROUND; this.vy=0; this.vx=0; this.airAtk=null; this.airFb=false; this.state='idle'; }
        break;
      case 'win': case 'ko_wait':
        break;
      default:{ // idle / walk / crouch
        if(game.state!=='fight') { this.state='idle'; break; }
        // AI直接コマンド
        if(inp.cmd){
          if(inp.cmd==='fb'){ this.specialFB(false); break; }
          if(inp.cmd==='dp'){ this.specialDP(); break; }
          if(inp.cmd==='super'){ this.specialFB(true); break; }
          if(inp.cmd==='tatsu'){ this.specialTatsu(); break; }
          if(inp.cmd==='grab'){ this.cmdGrab(opp); break; }
          if(inp.cmd==='wgrab'){
            // ゴウマ: 零式捕獲（ワープ後の投げ派生）
            const wg=this.chr.sp.warpGrab;
            if(wg && Math.abs(opp.x-this.x)<=wg.range && this.throwable(opp)) this.doThrow(opp,wg.dmg,'special1');
            else this.startAttack('s_hp');
            break;
          }
        }
        if(inp.up && !inp.down){
          this.state='jump'; this.vy=-15.2;
          this.vx=((inp.right?1:0)-(inp.left?1:0))*4;
          SFX.jump();
          break;
        }
        if(inp.down){ this.state='crouch'; this.crouchHeld=true; }
        else{
          this.crouchHeld=false;
          let mv=(inp.right?1:0)-(inp.left?1:0);
          if(mv!==0){
            const fwdMove=(mv===this.facing);
            this.x+=mv*(fwdMove?3.0:2.4);
            this.state='walk';
          }else this.state='idle';
        }
        if(this.bufP>0){
          this.bufP=0;
          this.pTimes.push(this.frame);
          if(this.pTimes.length>4) this.pTimes.shift();
          const fwdHeld=(this.facing===1?inp.right:inp.left);
          const backHeld=(this.facing===1?inp.left:inp.right);
          const dist=Math.abs(opp.x-this.x);
          if(this.chr.sp.supAlt && this.meter>=100 && this.checkSeq([2,1,4,2,1,4])){ this.specialBeam(true); }   // 214214P スーパー・レイバースト
          else if(this.chr.sp.cmdGrab && this.checkSeq([6,3,2,1,4])){ this.cmdGrab(opp); }
          else if(this.checkSeq([6,2,3])) this.specialDP();
          else if(this.checkSeq([2,3,6])){
            if(this.meter>=100 && this.checkSeq([2,3,6,2,3,6])) this.specialFB(true);   // 236236P（プリズムは beam に委譲）
            else this.specialFB(false);
          }
          else if(this.chr.sp.mash && this.pTimes.length>=3 && (this.frame-this.pTimes[this.pTimes.length-3])<=26){
            this.startAttack('mash'); SFX.dp();   // mashのボイスは startAttack 内の attackVoice(mash) で発火
          }
          else if(fwdHeld && dist<48 && this.throwable(opp) && this.state!=='crouch'){
            this.doThrow(opp,12); // 共通通常投げ
          }
          else{
            const pose=this.state==='crouch'?'c':'s';
            const str= fwdHeld?'m': backHeld?'h':'l';
            this.startAttack(pose+'_'+str+'p');
          }
        }else if(this.bufK>0){
          this.bufK=0;
          const fwdHeld=(this.facing===1?inp.right:inp.left);
          const backHeld=(this.facing===1?inp.left:inp.right);
          if(this.chr.sp.opticSweep && this.checkSeq([2,3,6])){ this.specialOptic(); }   // 236K ロー・レイ
          else if(this.checkSeq([2,3,6]) && this.meter>=100) this.specialFB(true);
          else if(this.checkSeq([2,1,4]) && this.specialTatsu()){ /* 214K */ }
          else if(this.checkSeq([6,2,3])) this.specialDP();
          else{
            const pose=this.state==='crouch'?'c':'s';
            const str= fwdHeld?'m': backHeld?'h':'l';
            this.startAttack(pose+'_'+str+'k');
          }
        }
        break;
      }
    }
    // 壁
    this.x=Math.max(36,Math.min(W-36,this.x));
  }

  // ================= 描画 =================
  draw(){
    const f=this;
    // 影
    ctx.fillStyle='rgba(0,0,0,.42)';
    ctx.beginPath(); ctx.ellipse(f.x,GROUND+5,32,8,0,0,Math.PI*2); ctx.fill();

    // プリズムガード: 一部の状態は追加モーションシート（char-prism-guard-extra.png）から描画する
    const exIdx=prismExtra(f);
    let src, frameArr;
    if(exIdx!=null && IMGS[f.chr.extraImg] && f.chr.extraFrames){
      src=IMGS[f.chr.extraImg]; frameArr=f.chr.extraFrames[exIdx];
    }else{
      src=IMGS[f.chr.img];
      frameArr=f.chr.frames ? f.chr.frames[getFrameIdx(f)] : null;
    }
    if(!src || !frameArr){ return; }

    const [sx,sy,sw,sh,cx,footY]=frameArr;
    const sc=f.chr.scale;
    const dw=sw*sc, dh=sh*sc;
    const ox=cx*sc, oy=footY*sc;

    ctx.save();
    ctx.translate(f.x, f.y);
    if(f.facing<0) ctx.scale(-1,1);

    // 影キャラ > 同キャラミラー(P2青系) の順で色変え
    let base='';
    if(f.tint) base=f.tint;
    else if(f.idx===1 && p1.chr===p2.chr) base='hue-rotate(200deg) saturate(110%)';
    let filt=base;
    if(f.flashT>0) filt=(base?base+' ':'')+'brightness(6)';
    if(filt) ctx.filter=filt;

    ctx.drawImage(src, sx,sy,sw,sh, -ox,-oy, dw,dh);
    ctx.filter='none';
    ctx.restore();

    // 昇龍拳の炎エフェクト（スプライトの上に重ねる）
    if(f.state==='dp'){
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.globalAlpha=0.38;
      ctx.fillStyle='rgba(255,200,80,1)';
      ctx.fillRect(f.facing*(-8),-oy*0.92,f.facing*22,-oy*0.32);
      ctx.globalAlpha=1;
      ctx.restore();
    }
  }
}

// ================= CPU AI =================
function aiTeleport(f,opp){
  // ゴウマ専用: 零式転移（CPU専用の短距離ワープ）
  f.tpCd=(f.tpCd||0);
  if(f.tpCd>0){ f.tpCd--; return; }
  if(Math.random()>=0.012) return;
  f.tpCd=180; f.tpT=24;
  spark(f.x,f.y-60,'#ff4a4a',10);
  const side=Math.random()<0.5?1:-1;
  f.x=Math.max(60,Math.min(W-60, opp.x+side*72));
  spark(f.x,f.y-60,'#ff4a4a',14);
  SFX.swing();
}
function aiThink(f,opp){
  const inp={left:false,right:false,up:false,down:false,punch:false,kick:false,cmd:null};
  if(game.state!=='fight') return inp;
  if(f.chr.id==='gouma' && f.canAct()) aiTeleport(f,opp);
  const dx=opp.x-f.x, ad=Math.abs(dx);
  const fwd= dx>0?'right':'left', back= dx>0?'left':'right';

  // 反応系
  const danger=projectiles.find(pr=>pr.owner!==f && !pr.dead &&
      Math.sign(f.x-pr.x)===Math.sign(pr.vx) && Math.abs(pr.x-f.x)<180);
  if(danger && f.grounded() && f.canAct()){
    if(Math.random()<0.10){ inp.up=true; inp[fwd]=true; return inp; }
    if(Math.random()<0.20){ f.aiPlan='block'; f.aiT=22; }
  }
  if((opp.state==='jump') && ad<150 && f.canAct() && Math.random()<0.10){
    inp.cmd='dp'; return inp;
  }

  f.aiT--;
  if(f.aiT<=0){
    const r=Math.random();
    if(ad>320){
      f.aiPlan = r<0.30?'fb' : r<0.75?'approach' : r<0.90?'jumpin' : 'idle';
      f.aiT=30+Math.random()*40|0;
    }else if(ad>150){
      f.aiPlan = r<0.48?'approach' : r<0.63?'jumpin' : r<0.78?'fb' : r<0.90?'kick' : 'block';
      f.aiT=24+Math.random()*30|0;
    }else{
      f.aiPlan = r<0.30?'punch' : r<0.50?'kick' : r<0.65?'sweep' : r<0.80?'block' : r<0.92?'retreat' : 'dp';
      f.aiT=16+Math.random()*22|0;
    }
    if(f.meter>=100 && ad>240 && Math.random()<0.5) f.aiPlan='super';
    if(f.chr.sp.cmdGrab && ad<70 && Math.random()<0.30) f.aiPlan='grab';
    if(f.chr.sp.tatsu && f.chr.sp.tatsu.dmg && ad>90 && ad<210 && Math.random()<0.16) f.aiPlan='tatsu';
    f.aiNew=true;
  }else f.aiNew=false;

  // ゴウマ: ワープ直後は投げ派生を狙う
  if(f.tpT>0){
    f.tpT--;
    if(f.chr.sp.warpGrab && ad<f.chr.sp.warpGrab.range && f.canAct()){ inp.cmd='wgrab'; f.tpT=0; return inp; }
  }

  switch(f.aiPlan){
    case 'approach': inp[fwd]=true; break;
    case 'retreat':  inp[back]=true; break;
    case 'jumpin':   inp[fwd]=true; if(f.aiNew) inp.up=true; break;
    case 'fb':       if(f.aiNew) inp.cmd='fb'; break;
    case 'super':    if(f.aiNew) inp.cmd='super'; break;
    case 'dp':       if(f.aiNew) inp.cmd='dp'; break;
    case 'tatsu':    if(f.aiNew) inp.cmd='tatsu'; break;
    case 'grab':     inp[fwd]=true; if(ad<64 && f.aiNew) inp.cmd='grab'; break;
    case 'punch':    if(f.aiNew){ inp.punch=true; if(Math.random()<0.5) inp[fwd]=true; } break;
    case 'kick':     if(f.aiNew){ inp.kick=true; if(Math.random()<0.5) inp[fwd]=true; } break;
    case 'sweep':    inp.down=true; if(f.aiNew) inp.kick=true; break;
    case 'block':    inp[back]=true; break;
  }
  return inp;
}

// ================= ゲーム本体 =================
const game={
  state:'title', mode:'cpu', menuIdx:0,
  round:1, wins:[0,0], timer:99*60,
  stateTimer:0, hitstop:0, shake:0, flash:0,
  winner:-1, koText:'K.O.', frame:0, score:[0,0],
  stage:'harbor',
  sel:[0,1], selPhase:0, stageIdx:0,   // stageIdx: 0=RANDOM, 1..=STAGE_IDS
  storyChar:0, storyNodes:null, storyIdx:0,
  lastHitSuper:false, superFxT:0,   // スーパーコンボKO背景演出
};
const SUPERFX_DUR=36;   // 約0.6秒（render基準60fps）
let p1=new Fighter(0,CHARS.ryuji);
let p2=new Fighter(1,CHARS.aoi);

function startMatch(mode){
  game.mode=mode; game.wins=[0,0]; game.round=1; game.score=[0,0];
  bgmStart();
  startRound(1);
}

function startVsMatch(stageId){
  // stageId 指定があればそのステージ、なければ全ステージからランダム
  game.stage = stageId || STAGE_IDS[Math.floor(Math.random()*STAGE_IDS.length)];
  p1=new Fighter(0,CHARS[ROSTER[game.sel[0]]]);
  p2=new Fighter(1,CHARS[ROSTER[game.sel[1]]]);
  startMatch(game.mode);
}

// ================= ストーリーモード =================
// 全角テキストを n 文字で折り返し
function wrapText(s,n){
  const out=[];
  for(let i=0;i<s.length;i+=n) out.push(s.slice(i,i+n));
  return out;
}
function storyStart(cid){
  const st=STORIES[cid];
  game.storyChar=cid;
  game.storyFight=0;
  const nodes=[
    {type:'text', bg:'harbor', lines:['【 '+st.title+' 】','',...wrapText(st.intro,24)]},
  ];
  for(const oid of st.route){
    const o=OPPONENTS[oid];
    nodes.push({type:'text', bg:o.stage, lines:['VS  '+o.name,'',...wrapText('「'+o.intro+'」',24)]});
    nodes.push({type:'fight', opp:o.char, oppName:o.name, stage:o.stage});
  }
  nodes.push({type:'text', bg:'neon', ending:true, lines:[...wrapText(st.ending,24),'','── '+CHARS[cid].name+'  STORY CLEAR ──']});
  // STORY CLEAR の後に続くエピローグ紙芝居（複数パネル）。背景はharborに切り替え、1枚ずつENTERで進む。
  const epi=st.epilogue||[];
  for(let i=0;i<epi.length;i++)
    nodes.push({type:'text', epilogue:true, epiIdx:i+1, epiTotal:epi.length, bg:'harbor', lines:wrapText(epi[i],22)});
  game.storyNodes=nodes;
  game.storyIdx=0;
  enterStoryNode();
}
function enterStoryNode(){
  if(game.storyIdx>=game.storyNodes.length){ game.state='title'; bgmStop(); return; }
  const n=game.storyNodes[game.storyIdx];
  game.stage=n.bg||n.stage;
  if(n.type==='text'){
    n.enterFrame=game.frame;
    game.state='story';
  }else{
    p1=new Fighter(0,CHARS[game.storyChar]);
    p2=new Fighter(1,CHARS[n.opp]);
    if(n.oppName) p2.name=n.oppName;
    startMatch('story');
  }
}
function startRound(n){
  game.round=n;
  p1.reset(W/2-180, 1);
  p2.reset(W/2+180,-1);
  projectiles=[]; particles=[];
  game.timer=99*60;
  game.lastHitSuper=false; game.superFxT=0;
  game.state='intro'; game.stateTimer=130;
  SFX.round();
}

function rectOverlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function resolveAttack(att,def){
  const hb=att.activeHitbox();
  if(!hb) return;
  if(def.invul()) return;
  if(!rectOverlap(hb,def.hurtbox())) return;
  att.hitConsumed=true;
  const dir=(def.x>=att.x)?1:-1;
  const info=att.curAtkInfo();
  // この一撃がスーパーコンボか（巨大ビーム / 超必ラッシュ）。KO時の背景演出判定に使う
  game.lastHitSuper = att.state==='beam' ||
    (att.state==='rush' && !!att.rushCfg && att.rushCfg===att.chr.sp.sup);
  const px=def.x-dir*16, py=hb.y+hb.h/2;
  if(def.inpBack && def.grounded() && ['idle','walk','crouch','block'].includes(def.state)){
    const chip=info.special?Math.ceil(info.dmg/4):0;
    def.enterBlock(14,chip,dir,def.state==='crouch'||def.crouchHeld);
    att.meter=Math.min(100,att.meter+4);
    spark(px,py,'#9ad',5);
    SFX.block();
    game.hitstop=4;
  }else{
    def.takeHit(info.dmg,dir,info.kd);
    att.meter=Math.min(100,att.meter+12);
    game.score[att.idx]+=info.dmg*105;
    spark(px,py,info.heavy?'#ffd24a':'#ff8844',info.heavy?12:8);
    if(info.heavy){ SFX.heavy(info.btn); game.shake=8; game.hitstop=9; }
    else { SFX.hit(info.btn,info.str); game.hitstop=6; }
  }
  checkKO();
}

function resolveProjectiles(){
  for(const pr of projectiles){
    if(pr.dead) continue;
    pr.t++; pr.x+=pr.vx;
    if(pr.vy){ pr.y+=pr.vy; if(pr.y>=GROUND-8){ spark(pr.x,GROUND-8,'#f84',8); pr.dead=true; continue; } }
    if(pr.x<-40||pr.x>W+40||pr.t>pr.life){ pr.dead=true; continue; }
    // 弾同士の相殺
    for(const o of projectiles){
      if(o===pr||o.dead||o.owner===pr.owner) continue;
      if(Math.abs(o.x-pr.x)<o.r+pr.r && Math.abs(o.y-pr.y)<o.r+pr.r){
        if(pr.sup&&!o.sup){ o.dead=true; }
        else if(o.sup&&!pr.sup){ pr.dead=true; }
        else { pr.dead=true; o.dead=true; }
        spark((o.x+pr.x)/2,pr.y,'#aef',10);
        SFX.block();
      }
    }
    if(pr.dead) continue;
    const def=(pr.owner===p1)?p2:p1;
    if(def.invul()) continue;
    const box={x:pr.x-pr.r,y:pr.y-pr.r,w:pr.r*2,h:pr.r*2};
    if(rectOverlap(box,def.hurtbox())){
      pr.dead=true;
      game.lastHitSuper=!!pr.sup;
      const dir=Math.sign(pr.vx)||1;
      if(def.inpBack && def.grounded() && ['idle','walk','crouch','block'].includes(def.state)){
        def.enterBlock(16,Math.ceil(pr.dmg/4),dir,def.state==='crouch'||def.crouchHeld);
        spark(pr.x,pr.y,'#9ad',6); SFX.block(); game.hitstop=4;
      }else{
        def.takeHit(pr.dmg,dir,pr.sup);
        pr.owner.meter=Math.min(100,pr.owner.meter+10);
        game.score[pr.owner.idx]+=pr.dmg*105;
        spark(pr.x,pr.y,pr.sup?'#ffb44d':'#7fd4ff',pr.sup?16:9);
        if(pr.sup){ SFX.heavy(); game.shake=10; game.hitstop=10; } else { SFX.hit(); game.hitstop=6; }
      }
      checkKO();
    }
  }
  projectiles=projectiles.filter(pr=>!pr.dead);
}

function checkKO(){
  if(game.state!=='fight') return;
  if(p1.hp<=0||p2.hp<=0){
    game.winner = p1.hp<=0 ? (p2.hp<=0?-1:1) : 0;
    game.koText='K.O.';
    game.state='ko'; game.stateTimer=170;
    game.shake=14;
    if(game.lastHitSuper) game.superFxT=SUPERFX_DUR;   // スーパーコンボKOのみ背景演出
    SFX.ko();
  }
}

function pushApart(){
  if(Math.abs(p1.y-p2.y)>80) return;
  const overlapStates=['down','getup','fall'];
  if(overlapStates.includes(p1.state)||overlapStates.includes(p2.state)) return;
  const dx=p2.x-p1.x;
  if(Math.abs(dx)<38){
    const push=(38-Math.abs(dx))/2;
    const s=dx>=0?1:-1;
    p1.x-=push*s; p2.x+=push*s;
    p1.x=Math.max(36,Math.min(W-36,p1.x));
    p2.x=Math.max(36,Math.min(W-36,p2.x));
  }
}

// ================= 進行 =================
function step(){
  game.frame++;
  if(game.hitstop>0){
    // ヒットストップ中も方向履歴とボタン先行入力は保持する
    game.hitstop--;
    if(game.state==='fight'){
      p1.pushDir(humanInput(MAP1));
      if(game.mode==='2p') p2.pushDir(humanInput(MAP2));
    }
    return;
  }

  switch(game.state){
    case 'title':{
      if(pressed.has('w')||pressed.has('arrowup')){ game.menuIdx=(game.menuIdx+2)%3; SFX.sel(); }
      if(pressed.has('s')||pressed.has('arrowdown')){ game.menuIdx=(game.menuIdx+1)%3; SFX.sel(); }
      if(pressed.has('enter')){
        game.mode=['story','cpu','2p'][game.menuIdx];
        game.sel=[0,1]; game.selPhase=0;
        game.state='select';
        SFX.round();
      }
      break;
    }
    case 'select':{
      const ph=game.selPhase;
      const mv=(d)=>{ game.sel[ph]=(game.sel[ph]+d+ROSTER.length)%ROSTER.length; SFX.sel(); };
      if(ph===0){
        if(pressed.has('a')||pressed.has('arrowleft')) mv(-1);
        if(pressed.has('d')||pressed.has('arrowright')) mv(1);
        if(pressed.has('f')||pressed.has('enter')){
          SFX.round();
          voice({chr:CHARS[ROSTER[game.sel[0]]]},'start1',0.85);
          if(game.mode==='story'){ storyStart(ROSTER[game.sel[0]]); }
          else if(game.mode==='cpu'){
            let o; do{ o=Math.floor(Math.random()*ROSTER.length); }while(o===game.sel[0]);
            game.sel[1]=o;
            game.stageIdx=0; game.state='stagesel';
          }
          else { game.sel[1]=game.sel[0]; game.selPhase=1; }
        }
      }else{
        if(pressed.has('arrowleft')) mv(-1);
        if(pressed.has('arrowright')) mv(1);
        if(pressed.has('k')||pressed.has('enter')){ SFX.round(); game.stageIdx=0; game.state='stagesel'; }
      }
      break;
    }
    case 'stagesel':{
      const n=STAGE_IDS.length+1;   // 先頭はRANDOM
      if(pressed.has('a')||pressed.has('arrowleft')){ game.stageIdx=(game.stageIdx+n-1)%n; SFX.sel(); }
      if(pressed.has('d')||pressed.has('arrowright')){ game.stageIdx=(game.stageIdx+1)%n; SFX.sel(); }
      if(pressed.has('f')||pressed.has('k')||pressed.has('enter')){
        SFX.round();
        startVsMatch(game.stageIdx===0 ? null : STAGE_IDS[game.stageIdx-1]);
      }
      break;
    }
    case 'story':{
      if(pressed.has('enter')||pressed.has('f')||pressed.has('k')){
        SFX.sel();
        game.storyIdx++;
        enterStoryNode();
      }
      break;
    }
    case 'intro':{
      p1.update(EMPTY_INP,p2); p2.update(EMPTY_INP,p1);
      game.stateTimer--;
      if(game.stateTimer===110 && game.round===1) voice(p1,'start1',0.85,{force:true});
      if(game.stateTimer===45) SFX.round();
      if(game.stateTimer<=0) game.state='fight';
      break;
    }
    case 'fight':{
      const i1=humanInput(MAP1);
      const i2=(game.mode==='2p')?humanInput(MAP2):aiThink(p2,p1);
      p1.update(i1,p2); p2.update(i2,p1);
      pushApart();
      resolveAttack(p1,p2); resolveAttack(p2,p1);
      resolveProjectiles();
      updParticles();
      game.timer--;
      if(game.timer<=0 && game.state==='fight'){
        game.winner = p1.hp===p2.hp ? -1 : (p1.hp>p2.hp?0:1);
        game.koText='TIME OVER';
        game.state='ko'; game.stateTimer=170;
        SFX.ko();
      }
      break;
    }
    case 'ko':{
      p1.update(EMPTY_INP,p2); p2.update(EMPTY_INP,p1);
      resolveProjectiles(); updParticles();
      game.stateTimer--;
      if(game.stateTimer===70 && game.winner>=0){
        const wf=game.winner===0?p1:p2;
        if(['idle','walk','crouch'].includes(wf.state)) wf.state='win';
        voice(wf,'win1',0.9,{force:true});
      }
      if(game.stateTimer<=0){
        if(game.winner>=0) game.wins[game.winner]++;
        if(game.winner>=0 && game.wins[game.winner]>=2){
          game.state='matchend'; game.stateTimer=0;
        }else{
          startRound(game.round+1);
        }
      }
      break;
    }
    case 'matchend':{
      p1.update(EMPTY_INP,p2); p2.update(EMPTY_INP,p1);
      updParticles();
      if(pressed.has('enter')){
        bgmStop();
        if(game.mode==='story'){
          if(game.winner===0){ game.storyIdx++; enterStoryNode(); }
          else { enterStoryNode(); }   // 同じ戦いをリトライ
        }else{
          game.state='title';
        }
      }
      break;
    }
  }
  if(pressed.has('escape') && game.state!=='title'){ game.state='title'; bgmStop(); }
  pressed.clear();
}

function starPath(cx,cy,r,rot){
  ctx.beginPath();
  for(let i=0;i<10;i++){
    const rr=(i%2===0)?r:r*0.45;
    const a=rot+i*Math.PI/5;
    const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.closePath();
}
function wood(x,y,w,h){

  ctx.moveTo(x,y); ctx.lineTo(x+w,y+h);
  ctx.moveTo(x+w,y); ctx.lineTo(x,y+h);
  ctx.stroke();
}

function drawThinBeam(pr){
  const dir=Math.sign(pr.vx)||1;
  const len=44+pr.r*2.4, x=pr.x, y=pr.y, r=pr.r;
  ctx.save();
  ctx.globalAlpha=0.88;
  ctx.fillStyle='rgba(255,70,200,.7)';   ctx.fillRect(x-dir*len, y-r-3, dir*len, (r+3)*2);
  ctx.fillStyle='#fff';                  ctx.fillRect(x-dir*len, y-r*0.5, dir*len, r);
  ctx.fillStyle='rgba(255,160,235,.95)';
  ctx.beginPath(); ctx.arc(x,y,r+2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.9)';
  ctx.beginPath(); ctx.arc(x,y,r*0.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawProj(pr){
  if(pr.beamThin){ drawThinBeam(pr); return; }
  const a=pr.t/2;
  ctx.save(); ctx.translate(pr.x,pr.y);
  // 螺旋の尾
  for(let i=1;i<=6;i++){
    const off=-Math.sign(pr.vx)*(i*pr.r*0.62+6);
    const r=Math.max(4,pr.r*(1-i*0.12));
    ctx.fillStyle= (pr.sup||pr.warm)
      ? `rgba(255,${160-i*18},40,${0.55-i*0.09})`
      : `rgba(120,${200-i*14},255,${0.55-i*0.09})`;
    ctx.beginPath(); ctx.arc(off, Math.sin(a+i)*5, r, 0, Math.PI*2); ctx.fill();
  }
  // 本体＋渦巻き
  ctx.fillStyle= pr.warm?'#ff6a4a':(pr.sup?'#ffb44d':'#86d8ff');
  ctx.beginPath(); ctx.arc(0,0,pr.r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0,0,pr.r*0.64,a,a+4.2); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,pr.r*0.36,-a,-a+3.4); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(0,0,pr.r*0.28,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// 巨大ビーム超必の演出: 画面横断の太い白コア＋ピンク/マゼンタ縁、横スピードライン、発射口フラッシュ。
// ビーム本体はキャンバス描画（スプライト内のビームには依存しない）。
function drawBeamSuper(f){
  if(!f.beamCfg) return;
  const w=f.beamWind, a=f.beamActive;
  if(f.t<=w || f.t>w+a) return;                 // 発射中のみ
  const prog=(f.t-w)/a, dir=f.facing;
  const s=f.hitScale||1;                        // 見た目scaleに連動（大型化）
  const y=f.y-80*s, x0=f.x+dir*34*s;
  const x1= dir>0 ? W+40 : -40;
  const reach=Math.min(1,(f.t-w)/4);            // 前方へ素早く伸びる
  const tipX=x0+(x1-x0)*reach;
  const half=(40+Math.sin(f.t*0.7)*5)*s*(0.55+0.45*Math.min(1,prog*3));
  const left=Math.min(x0,tipX), bw=Math.abs(tipX-x0);
  ctx.save();
  // 横スピードライン
  ctx.globalAlpha=0.5; ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
  for(let i=0;i<6;i++){
    const yy=y+(Math.random()-0.5)*half*2.4;
    ctx.beginPath(); ctx.moveTo(x0,yy); ctx.lineTo(tipX,yy); ctx.stroke();
  }
  ctx.globalAlpha=1;
  // マゼンタ外縁
  const gGlow=ctx.createLinearGradient(0,y-half*1.8,0,y+half*1.8);
  gGlow.addColorStop(0,'rgba(255,40,180,0)'); gGlow.addColorStop(0.5,'rgba(255,60,200,.85)'); gGlow.addColorStop(1,'rgba(255,40,180,0)');
  ctx.fillStyle=gGlow; ctx.fillRect(left, y-half*1.7, bw, half*3.4);
  // 白コア
  const gCore=ctx.createLinearGradient(0,y-half,0,y+half);
  gCore.addColorStop(0,'rgba(255,200,240,.2)'); gCore.addColorStop(0.5,'rgba(255,255,255,1)'); gCore.addColorStop(1,'rgba(255,200,240,.2)');
  ctx.fillStyle=gCore; ctx.fillRect(left, y-half, bw, half*2);
  // 発射口フラッシュ
  ctx.fillStyle='rgba(255,90,210,.6)'; ctx.beginPath(); ctx.arc(x0,y,half*2.0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.92)'; ctx.beginPath(); ctx.arc(x0,y,half*1.25*(0.85+Math.random()*0.3),0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(Math.random()<0.6) spark(tipX,y+(Math.random()-0.5)*half,'#ff7ad2',3);
}

function drawTitle(){
  drawBG();
  ctx.fillStyle='rgba(0,0,10,.45)'; ctx.fillRect(0,0,W,H);
  pxText('SUPER',W/2,86,40,'#ffd24a');
  pxText('FIGHTER II X',W/2,140,64,'#ff5a2a');
  pxText('〜 ブラウザ対戦格闘・ストIIX リスペクト 〜',W/2,186,16,'#fbe9c0');
  const items=['ストーリーモード','1P  vs  CPU','2P  対戦 (同じキーボード)'];
  for(let i=0;i<items.length;i++){
    const sel=(game.menuIdx===i);
    pxText((sel?'▶ ':'   ')+items[i],W/2,242+i*36,24, sel?(game.frame%30<20?'#fff':'#ffd24a'):'#9a8a7a');
  }
  pxText('ENTERで開始 / ESCでタイトルへ',W/2,354,15,'#cbb');
  pxText('1P: WASD移動  F=パンチ G=キック',W/2,388,14,'#8fd');
  pxText('2P: 矢印キー移動  K=パンチ L=キック',W/2,410,14,'#f9a');
  pxText('通常技: ボタン＋ニュートラル/前/後で 弱・中・強  しゃがみ対応',W/2,432,13,'#ffd24a');
  pxText('飛び道具:↓↘→P  対空:→↓↘P  突進/移動:↓↙←K  投げ:接近して前＋P',W/2,452,13,'#ffd24a');
  pxText('超必: ゲージMAXで ↓↘→K   ブロント: ←↙↓↘→P コマ投げ   M: BGM',W/2,470,13,'#ffd24a');
  pxText('プリズムガード: ↓↘→P ビーム / ↓↙←K 足元ビーム / ↓↘→↓↘→P 巨大ビーム超必',W/2,488,12,'#7fd4ff');
}

function drawCharPreview(key,cx,baseY,scale,filt){
  const c=CHARS[key], src=IMGS[c.img];
  if(!src || !c.frames) return;
  const [sx,sy,sw,sh,fx,footY]=c.frames[c.roles.idle[0]];
  ctx.save();
  if(filt) ctx.filter=filt;
  ctx.drawImage(src, sx,sy,sw,sh, cx-fx*scale, baseY-footY*scale, sw*scale, sh*scale);
  ctx.restore();
}

function drawSelect(){
  drawBG();
  ctx.fillStyle='rgba(0,0,10,.62)'; ctx.fillRect(0,0,W,H);
  pxText('SELECT  YOUR  FIGHTER',W/2,56,34,'#ffd24a');
  // ロスター数に応じて箱幅を自動調整（5〜6体でも横一列に収める）
  const n=ROSTER.length, boxH=270, gap=12, by=104, margin=20;
  const boxW=Math.min(192, Math.floor((W-margin*2-(n-1)*gap)/n));
  const total=n*boxW+(n-1)*gap, x0=(W-total)/2;
  const previewScale=Math.max(0.5, Math.min(0.95, boxW/200));
  for(let i=0;i<n;i++){
    const x=x0+i*(boxW+gap);
    const key=ROSTER[i];
    const selBy1=(game.sel[0]===i);
    const selBy2=(game.selPhase===1 && game.sel[1]===i);
    ctx.fillStyle='rgba(20,24,48,.85)'; ctx.fillRect(x,by,boxW,boxH);
    ctx.lineWidth=5;
    if(selBy1){ ctx.strokeStyle=(game.frame%20<12)?'#ff5a2a':'#c83018'; ctx.strokeRect(x-3,by-3,boxW+6,boxH+6); }
    if(selBy2){ ctx.strokeStyle=(game.frame%20<12)?'#3a8cf4':'#1a5cb4'; ctx.strokeRect(x+4,by+4,boxW-8,boxH-8); }
    if(!selBy1&&!selBy2){ ctx.strokeStyle='#555'; ctx.lineWidth=2; ctx.strokeRect(x,by,boxW,boxH); }
    const mirror=(game.selPhase===1 && game.sel[0]===game.sel[1] && game.sel[1]===i);
    drawCharPreview(key, x+boxW/2, by+boxH-52, previewScale, mirror?'hue-rotate(200deg) saturate(110%)':'');
    pxText(CHARS[key].name, x+boxW/2, by+boxH-30, boxW<150?15:18, '#fff');
    pxText(CHARS[key].title, x+boxW/2, by+boxH-12, boxW<150?10:12, '#caa');
  }
  if(game.selPhase===0){
    pxText(game.mode==='2p'?'P1: ←→で選択  F / ENTERで決定':'←→で選択  F / ENTERで決定',W/2,440,17,'#8fd');
  }else{
    pxText('P2: ←→で選択  K / ENTERで決定',W/2,440,17,'#f9a');
  }
  pxText('ESCでタイトルへ',W/2,468,13,'#cbb');
}

function drawStageSel(){
  // ハイライト中のステージを全画面プレビュー（RANDOMは一定間隔で巡回表示）
  const id = game.stageIdx===0
    ? STAGE_IDS[Math.floor(game.frame/30)%STAGE_IDS.length]
    : STAGE_IDS[game.stageIdx-1];
  const img=IMGS[id];
  if(img) ctx.drawImage(img,0,0,W,H);
  else { ctx.fillStyle='#101018'; ctx.fillRect(0,0,W,H); }
  ctx.fillStyle='rgba(0,0,10,.38)'; ctx.fillRect(0,0,W,H);
  pxText('SELECT  STAGE',W/2,56,34,'#ffd24a');
  const label = game.stageIdx===0 ? 'RANDOM' : STAGES[id].name;
  pxText('◀   '+label+'   ▶',W/2,H-104,30,(game.frame%30<20)?'#fff':'#ffd24a');
  pxText(game.stageIdx===0
    ? 'おまかせ（全'+STAGE_IDS.length+'ステージから抽選）'
    : game.stageIdx+' / '+STAGE_IDS.length,
    W/2,H-70,14,'#cbb');
  pxText('←→で選択  F / ENTERで決定  ESCでタイトルへ',W/2,H-38,15,'#8fd');
}

function easeOutCubic(t){ return 1-Math.pow(1-Math.max(0,Math.min(1,t)),3); }

function drawEndingStory(n,me){
  const t=Math.max(0, game.frame-(n.enterFrame||game.frame));
  const inT=easeOutCubic(t/70);
  const bg=IMGS[game.stage]||IMGS.neon;
  if(bg){
    const pan=Math.sin(t/180)*10;
    ctx.drawImage(bg,-pan,-6,W+20,H+12);
  }else drawBG();
  ctx.fillStyle='rgba(3,4,16,.62)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,216,92,.08)';
  ctx.fillRect(-W + ((t*3)%(W*2)), 0, W*0.42, H);
  for(let i=0;i<24;i++){
    const x=(i*67+t*0.55)%W, y=(i*41+t*0.22)%H;
    ctx.fillStyle='rgba(120,210,255,.10)';
    ctx.fillRect(x,y,2,2);
  }

  const bob=Math.sin(t/18)*5;
  const charX=130-80*(1-inT);
  ctx.save();
  ctx.globalAlpha=inT;
  drawCharPreview(game.storyChar, charX, 430+bob, 1.58+Math.sin(t/55)*0.025, '');
  ctx.restore();

  pxText(me.name, W/2-40, 58, 30, '#ffd24a');
  pxText('STORY', W/2+150, 58, 22, '#ffd24a');
  const lines=n.lines;
  for(let i=0;i<lines.length;i++){
    const a=easeOutCubic((t-22-i*12)/42);
    if(a<=0) continue;
    ctx.save();
    ctx.globalAlpha=a;
    pxText(lines[i], 264, 140+i*36, i===lines.length-1?18:19, i===lines.length-1?'#fff':'#fbe9c0', 'left');
    ctx.restore();
  }
  if(t>80 && game.frame%40<28) pxText('▶ ENTER', W-90, H-40, 17, '#fff');
}

// STORY CLEAR の後に流すエピローグ紙芝居の1パネル。背景パン＋キャラ左フェードイン＋光の帯＋
// 粒子＋本文の順次フェードイン＋パネル番号(◆◇◇)＋遅延ENTER点滅。enterStoryNodeで記録したenterFrameで時間管理。
function drawEpilogueStory(n,me){
  const t=Math.max(0, game.frame-(n.enterFrame||game.frame));
  const inT=easeOutCubic(t/70);
  const bg=IMGS[game.stage]||IMGS.harbor;
  if(bg){ const pan=Math.sin(t/200)*12; ctx.drawImage(bg,-pan,-6,W+20,H+12); } else drawBG();
  ctx.fillStyle='rgba(4,6,18,.66)'; ctx.fillRect(0,0,W,H);
  // 光の帯（ゆっくり横断）
  ctx.fillStyle='rgba(255,225,140,.07)';
  ctx.fillRect(-W + ((t*2.4)%(W*2)), 0, W*0.5, H);
  // 流れる粒子
  for(let i=0;i<22;i++){ const x=(i*73+t*0.5)%W, y=(i*47+t*0.18)%H;
    ctx.fillStyle='rgba(150,210,255,.10)'; ctx.fillRect(x,y,2,2); }
  // キャラ左フェードイン＋上下揺れ
  const bob=Math.sin(t/20)*4, charX=120-70*(1-inT);
  ctx.save(); ctx.globalAlpha=inT;
  drawCharPreview(game.storyChar, charX, 432+bob, 1.5+Math.sin(t/60)*0.02, '');
  ctx.restore();
  pxText(me.name+'  EPILOGUE', W/2+40, 56, 22, '#ffd24a');
  // 本文の順次フェードイン
  const lines=n.lines;
  for(let i=0;i<lines.length;i++){ const a=easeOutCubic((t-20-i*14)/44); if(a<=0) continue;
    ctx.save(); ctx.globalAlpha=a; pxText(lines[i], 264, 150+i*38, 20, '#fdf0d0', 'left'); ctx.restore(); }
  // パネル番号 ◆◇◇
  let dots=''; for(let i=1;i<=n.epiTotal;i++) dots += (i===n.epiIdx?'◆':'◇')+' ';
  pxText(dots.trim(), W/2, H-66, 16, '#9cf');
  // 遅延ENTER点滅
  if(t>70 && game.frame%40<28) pxText('▶ ENTER', W-90, H-40, 17, '#fff');
}

function drawStory(){
  const me=CHARS[game.storyChar];
  const n=game.storyNodes[game.storyIdx];
  if(n.epilogue){ drawEpilogueStory(n,me); return; }
  if(n.ending){ drawEndingStory(n,me); return; }
  drawBG();
  ctx.fillStyle='rgba(0,0,12,.72)'; ctx.fillRect(0,0,W,H);
  drawCharPreview(game.storyChar, 130, 430, 1.5, '');
  pxText(me.name+'  STORY', W/2, 60, 30, '#ffd24a');
  const lines=n.lines;
  for(let i=0;i<lines.length;i++){
    pxText(lines[i], 264, 140+i*36, 19, '#fbe9c0', 'left');
  }
  if(game.frame%40<28) pxText('▶ ENTER', W-90, H-40, 17, '#fff');
}

function drawLoading(){
  ctx.fillStyle='#07070f'; ctx.fillRect(0,0,W,H);
  const dots='.'.repeat((game.frame>>4)%4);
  pxText('LOADING'+dots,W/2,H/2,28,'#ffd24a');
}

function render(){
  if(!assetsLoaded){ drawLoading(); return; }
  if(game.state==='title'){ drawTitle(); return; }
  if(game.state==='select'){ drawSelect(); return; }
  if(game.state==='stagesel'){ drawStageSel(); return; }
  if(game.state==='story'){ drawStory(); return; }
  // 画面揺れは背景・演出・キャラに同じオフセットで適用（HUDは揺らさない）
  let _shx=0,_shy=0;
  if(game.shake>0){ game.shake--; _shx=(Math.random()-0.5)*9; _shy=(Math.random()-0.5)*9; }
  ctx.save();
  ctx.translate(_shx,_shy);
  drawBG();
  // スーパーコンボKO演出: 4フレームの放射バーストを画面全体に拡大表示（キャラ背面・HUDより下）。
  // render側で減算するため、ヒットストップ/KO停止中も再生が進み、終了後は確実に消える。
  if(game.superFxT>0){
    const fx=IMGS.superfx;
    if(fx){
      const fw=fx.width/4, fh=fx.height;                                  // 1280x240 → 320x240 ×4
      const fi=Math.min(3, ((SUPERFX_DUR-game.superFxT)/(SUPERFX_DUR/4))|0); // 左から順に再生
      const sc=Math.max(W/fw, H/fh);                                       // 中央基準カバーフィット
      const dw=fw*sc, dh=fh*sc;
      ctx.drawImage(fx, fi*fw,0,fw,fh, (W-dw)/2,(H-dh)/2, dw,dh);
    }
    game.superFxT--;
  }
  for(const pr of projectiles) drawProj(pr);
  // ビーム超必は演出を先に描き、キャラを前面に重ねる（発射ポーズの腕・体が発射口フラッシュで隠れないように）
  if(p1.state==='beam') drawBeamSuper(p1);
  if(p2.state==='beam') drawBeamSuper(p2);
  ctx.restore();
  // HUDをキャラより先に描く: 空中に高く打ち上がってもキャラがHUDバーで途切れて見えないように。
  drawHUD();
  ctx.save();
  ctx.translate(_shx,_shy);
  p1.draw(); p2.draw();
  for(const p of particles){
    ctx.fillStyle=p.col;
    ctx.fillRect(p.x-2,p.y-2, p.life>6?5:3, p.life>6?5:3);
  }
  ctx.restore();
  // 状態テキスト
  if(game.state==='intro'){
    if(game.stateTimer>45) pxText('ROUND '+game.round,W/2,H/2-30,52,'#ffd24a');
    else pxText('FIGHT!',W/2,H/2-30,64,'#ff5a2a');
  }
  if(game.state==='ko' && game.stateTimer>60){
    pxText(game.koText,W/2,H/2-40,game.koText==='K.O.'?96:56,'#ff2a2a');
    if(game.winner<0) pxText('DRAW',W/2,H/2+30,36,'#fff');
  }
  if(game.state==='matchend'){
    if(game.mode==='story'){
      if(game.winner===0){
        pxText('VICTORY!',W/2,H/2-40,52,'#ffd24a');
        if(game.frame%40<28) pxText('ENTERで物語を進める',W/2,H/2+30,22,'#fff');
      }else{
        pxText('CONTINUE?',W/2,H/2-40,52,'#ff5a2a');
        if(game.frame%40<28) pxText('ENTERで再挑戦 / ESCでタイトルへ',W/2,H/2+30,22,'#fff');
      }
    }else{
      const wname=(game.winner===0?p1.name:p2.name)+((game.mode==='cpu'&&game.winner===1)?' (CPU)':'');
      pxText(wname+'  WINS!',W/2,H/2-40,52,'#ffd24a');
      if(game.frame%40<28) pxText('PRESS ENTER',W/2,H/2+30,22,'#fff');
    }
  }
  if(game.flash>0){
    game.flash--;
    ctx.fillStyle='rgba(255,255,255,'+(game.flash/16)+')';
    ctx.fillRect(0,0,W,H);
  }
}

// ================= メインループ =================
let last=performance.now(), acc=0;
function loop(ts){
  requestAnimationFrame(loop);
  acc+=Math.min(60,ts-last); last=ts;
  while(acc>=STEP){ step(); acc-=STEP; }
  render();
}
loadAssets();
loadSounds();
requestAnimationFrame(loop);
</script>
